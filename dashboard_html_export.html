function KpiCard({ label, value, color, big }) {
  return (
    <div style={{background:"#fff",borderRadius:10,padding:"12px 14px",flex:1,minWidth:big?150:105,borderTop:`3px solid ${color}`,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
      <div style={{fontSize:9,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:4}}>{label}</div>
      <div style={{fontSize:big?22:16,fontWeight:800,color:big?color:"#111827"}}>{value}</div>
    </div>
  );
}

function DataTable({ rows=[], cols=[] }) {
  const fv = (col, val) => {
    if (val===null||val===undefined||val==="") return "—";
    if (col==="status") return <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99,background:(val==="ACTIVE"||val==="ENABLED")?"#d1fae5":"#fef9c3",color:(val==="ACTIVE"||val==="ENABLED")?"#065f46":"#92400e"}}>{val}</span>;
    if (PCT_COLS.has(col)) return fmtP(val);
    if (col==="frequency") return isNaN(Number(val))?"—":Number(val).toFixed(2);
    if (TEXT_COLS.has(col)) return String(val);
    return fmt(val);
  };
  if (!rows.length) return <div style={{color:"#9ca3af",fontSize:12,padding:"20px 0",textAlign:"center"}}>Chưa có data</div>;
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead><tr style={{borderBottom:"2px solid #f3f4f6"}}>
          {cols.map(c=><th key={c} style={{padding:"5px 8px",textAlign:TEXT_COLS.has(c)?"left":"right",color:"#6b7280",fontWeight:700,fontSize:9,textTransform:"uppercase",whiteSpace:"nowrap"}}>{COL_LABELS[c]||c}</th>)}
        </tr></thead>
        <tbody>{rows.map((row,i)=>(
          <tr key={i} style={{borderBottom:"1px solid #f9fafb",background:i%2===0?"#fff":"#fafafa"}}>
            {cols.map(c=><td key={c} style={{padding:"7px 8px",textAlign:TEXT_COLS.has(c)?"left":"right",fontWeight:c==="name"?600:400,color:c==="name"?"#111827":"#374151",whiteSpace:"nowrap"}}>{fv(c,row[c])}</td>)}
          </tr>
        ))}</tbody>
      </table>
    </div>
  );
}

function DemoChart({ d, platform, metaType, dimKey }) {
  const rows = (d?.[dimKey]||[]).map(r=>({...r,_lbl:r.range||r.gender||""}));
  const total = rows.reduce((s,r)=>s+Number(r.impressions||0),0);
  const rowsP = rows.map(r=>({...r,_pct:total>0?Number((r.impressions/total*100).toFixed(1)):0}));
  const mk = platform==="tiktok"?"view_6s":platform==="youtube"?"views":metaType==="reach"?"impressions":metaType==="engagement"?"engagement":"thruplays";
  const ml = platform==="tiktok"?"View 6s":platform==="youtube"?"Views":metaType==="reach"?"Impressions":metaType==="engagement"?"Engagement":"ThruPlays";
  const pc = PLAT_CFG[platform]?.color||"#6366f1";
  return (
    <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
      <div style={{flex:2,minWidth:260,background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>{dimKey==="age"?"Age":"Gender"} — {ml}</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={rowsP} margin={{top:4,right:8,left:0,bottom:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6"/>
            <XAxis dataKey="_lbl" tick={{fontSize:11,fill:"#6b7280"}} tickLine={false}/>
            <YAxis tick={{fontSize:10,fill:"#9ca3af"}} tickLine={false} axisLine={false} tickFormatter={v=>Number(v).toLocaleString()}/>
            <Tooltip formatter={v=>[fmt(v),ml]} contentStyle={{borderRadius:8,fontSize:12}}/>
            <Bar dataKey={mk} radius={[4,4,0,0]}>{rowsP.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}</Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{flex:1,minWidth:180,background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Impressions %</div>
        <ResponsiveContainer width="100%" height={200}>
          <PieChart>
            <Pie data={rowsP} dataKey="_pct" nameKey="_lbl" cx="50%" cy="50%" outerRadius={75} label={({name,value})=>value>5?`${name}: ${value}%`:""} fontSize={10}>
              {rowsP.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}
            </Pie>
            <Tooltip formatter={v=>[`${v}%`,"Impressions %"]}/>
          </PieChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function AdTable({ rows, baseCols, kpiKey, kpiLabel }) {
  const fmtMap = {};
  rows.forEach(r=>{
    const f=parseFormat(r.name);
    if(!fmtMap[f]) fmtMap[f]={format:f,impressions:0,[kpiKey]:0};
    fmtMap[f].impressions+=Number(r.impressions||0);
    fmtMap[f][kpiKey]=(fmtMap[f][kpiKey]||0)+Number(r[kpiKey]||0);
  });
  const fmtData = Object.values(fmtMap);
  const fv2 = (col,val) => {
    if(val===null||val===undefined||val==="") return "—";
    if(PCT_COLS.has(col)) return fmtP(val);
    if(col==="frequency") return Number(val).toFixed(2);
    if(TEXT_COLS.has(col)) return String(val);
    return fmt(val);
  };
  return (
    <div>
      {fmtData.length>0&&(
        <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Format — {kpiLabel}</div>
          <ResponsiveContainer width="100%" height={140}>
            <BarChart data={fmtData} margin={{top:4,right:8,left:0,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6"/>
              <XAxis dataKey="format" tick={{fontSize:11,fill:"#6b7280"}} tickLine={false}/>
              <YAxis tick={{fontSize:10,fill:"#9ca3af"}} tickLine={false} axisLine={false} tickFormatter={v=>Number(v).toLocaleString()}/>
              <Tooltip formatter={v=>[fmt(v),kpiLabel]} contentStyle={{borderRadius:8,fontSize:12}}/>
              <Bar dataKey={kpiKey} radius={[4,4,0,0]}>{fmtData.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}</Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}
      <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Ad Performance</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{borderBottom:"2px solid #f3f4f6"}}>
              <th style={{padding:"5px 8px",textAlign:"left",color:"#6b7280",fontWeight:700,fontSize:9,textTransform:"uppercase"}}>Format</th>
              <th style={{padding:"5px 8px",textAlign:"left",color:"#6b7280",fontWeight:700,fontSize:9,textTransform:"uppercase"}}>Ad Name</th>
              {baseCols.map(c=><th key={c} style={{padding:"5px 8px",textAlign:"right",color:"#6b7280",fontWeight:700,fontSize:9,textTransform:"uppercase",whiteSpace:"nowrap"}}>{COL_LABELS[c]||c}</th>)}
            </tr></thead>
            <tbody>{rows.map((row,i)=>(
              <tr key={i} style={{borderBottom:"1px solid #f9fafb",background:i%2===0?"#fff":"#fafafa"}}>
                <td style={{padding:"7px 8px",whiteSpace:"nowrap"}}>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,background:PIE_COLORS[i%PIE_COLORS.length]+"22",color:PIE_COLORS[i%PIE_COLORS.length]}}>{parseFormat(row.name)}</span>
                </td>
                <td style={{padding:"7px 8px",fontWeight:600,color:"#111827",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={parseAdName(row.name)}>{parseAdName(row.name)}</td>
                {baseCols.map(c=><td key={c} style={{padding:"7px 8px",textAlign:"right",color:"#374151",whiteSpace:"nowrap"}}>{fv2(c,row[c])}</td>)}
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard() {
  const [platform,setPlatform] = useState("meta");
  const [metaType,setMetaType] = useState("reach");
  const [section,setSection]   = useState("overview");

  const key      = platform==="meta"?`meta_${metaType}`:platform;
  const d        = DATA[key]||{};
  const s        = d.summary||{};
  const pc       = PLAT_CFG[platform]?.color||"#6366f1";
  const sections = platform==="meta"?SECTIONS_META:platform==="youtube"?SECTIONS_YT:SECTIONS_TT;
  const baseCols = TYPE_COLS[key]||[];

  const getKpiKey   = () => platform==="tiktok"?"view_6s":platform==="youtube"?"trueview_views":metaType==="reach"?"reach":metaType==="engagement"?"engagement":"thruplays";
  const getKpiLabel = () => platform==="tiktok"?"6s Views":platform==="youtube"?"TrueView":metaType==="reach"?"Reach":metaType==="engagement"?"Engagement":"ThruPlays";

  function getKpis() {
    if (platform==="meta") {
      if (metaType==="reach") return [
        {label:"Reach (Total)",value:fmt(s.reach),      color:"#1877f2",big:true},
        {label:"Impressions",  value:fmt(s.impressions), color:"#6366f1"},
        {label:"Frequency",    value:s.frequency?.toFixed(2)||"—",color:"#8b5cf6"},
        {label:"Clicks",       value:fmt(s.link_clicks), color:"#3b82f6"},
        {label:"CTR",          value:fmtP(s.ctr),        color:"#10b981"},
        {label:"ThruPlays",    value:fmt(s.thruplays),   color:"#f59e0b"},
        {label:"Post Eng.",    value:fmt(s.post_engagements),color:"#ec4899"},
        {label:"Reactions",    value:fmt(s.reactions),   color:"#ef4444"},
        {label:"Comments",     value:fmt(s.comments),    color:"#06b6d4"},
        {label:"Saves",        value:fmt(s.saves),       color:"#8b5cf6"},
        {label:"Shares",       value:fmt(s.shares),      color:"#f59e0b"},
      ];
      if (metaType==="engagement") return [
        {label:"Engagement",   value:fmt(s.engagement),       color:"#42b72a",big:true},
        {label:"Impressions",  value:fmt(s.impressions),      color:"#6366f1"},
        {label:"Reach",        value:fmt(s.reach),            color:"#1877f2"},
        {label:"Frequency",    value:s.frequency?.toFixed(2)||"—",color:"#8b5cf6"},
        {label:"ER",           value:fmtP(s.engagement_rate), color:"#42b72a"},
        {label:"Clicks",       value:fmt(s.link_clicks),      color:"#3b82f6"},
        {label:"CTR",          value:fmtP(s.ctr),             color:"#10b981"},
        {label:"Reactions",    value:fmt(s.reactions),        color:"#f59e0b"},
        {label:"Comments",     value:fmt(s.comments),         color:"#06b6d4"},
        {label:"Saves",        value:fmt(s.saves),            color:"#8b5cf6"},
        {label:"Shares",       value:fmt(s.shares),           color:"#ec4899"},
      ];
      return [
        {label:"ThruPlays",  value:fmt(s.thruplays),  color:"#f02849",big:true},
        {label:"Impressions",value:fmt(s.impressions), color:"#6366f1"},
        {label:"Reach",      value:fmt(s.reach),       color:"#1877f2"},
        {label:"Frequency",  value:s.frequency?.toFixed(2)||"—",color:"#8b5cf6"},
        {label:"View Rate",  value:fmtP(s.view_rate),  color:"#10b981"},
        {label:"Clicks",     value:fmt(s.link_clicks), color:"#3b82f6"},
        {label:"CTR",        value:fmtP(s.ctr),        color:"#06b6d4"},
        {label:"Reactions",  value:fmt(s.reactions),   color:"#f59e0b"},
        {label:"Comments",   value:fmt(s.comments),    color:"#8b5cf6"},
        {label:"Saves",      value:fmt(s.saves),       color:"#ec4899"},
        {label:"Shares",     value:fmt(s.shares),      color:"#ef4444"},
      ];
    }
    if (platform==="youtube") return [
      {label:"TrueView Views",value:fmt(s.trueview_views),  color:"#ff0000",big:true},
      {label:"Impressions",   value:fmt(s.impressions),     color:"#6366f1"},
      {label:"TrueView Rate", value:fmtP(s.trueview_rate),  color:"#10b981"},
      {label:"Clicks",        value:fmt(s.link_clicks),     color:"#3b82f6"},
      {label:"CTR",           value:fmtP(s.ctr),            color:"#8b5cf6"},
      {label:"Interactions",  value:fmt(s.interactions),    color:"#f59e0b"},
      {label:"Int. Rate",     value:fmtP(s.interaction_rate),color:"#ec4899"},
      {label:"Engagement",    value:fmt(s.engagement),      color:"#42b72a"},
      {label:"Eng. Rate",     value:fmtP(s.engagement_rate),color:"#06b6d4"},
    ];
    return [
      {label:"6s Views",      value:fmt(s.view_6s),             color:"#010101",big:true},
      {label:"Impressions",   value:fmt(s.impressions),         color:"#6366f1"},
      {label:"Reach",         value:fmt(s.reach),               color:"#3b82f6"},
      {label:"Frequency",     value:s.frequency?.toFixed(2)||"—",color:"#8b5cf6"},
      {label:"6s View Rate",  value:fmtP(s.view_rate),          color:"#10b981"},
      {label:"Clicks (all)",  value:fmt(s.link_clicks),         color:"#f59e0b"},
      {label:"CTR (all)",     value:fmtP(s.ctr),                color:"#ec4899"},
      {label:"Paid Follows",  value:fmt(s.paid_follows),        color:"#42b72a"},
      {label:"Paid Likes",    value:fmt(s.paid_likes),          color:"#ef4444"},
      {label:"Paid Comments", value:fmt(s.paid_comments),       color:"#06b6d4"},
      {label:"Paid Shares",   value:fmt(s.paid_shares),         color:"#f02849"},
      {label:"Profile Visits",value:fmt(s.paid_profile_visits), color:"#a855f7"},
    ];
  }

  function renderOverview() {
    const campInfo = d.campaigns?.[0];
    return (
      <div>
        {campInfo&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"6px 12px",marginBottom:12,fontSize:12,color:"#1e40af"}}><b>Campaign:</b> {campInfo.name}</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>{getKpis().map(k=><KpiCard key={k.label} {...k}/>)}</div>
        <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Campaign Breakdown</div>
          <DataTable rows={d.campaigns||[]} cols={["name","status",...baseCols]}/>
        </div>
      </div>
    );
  }

  function renderTA() {
    const rows = platform==="tiktok"?d.ad_groups:d.ad_sets;
    return (
      <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Ad Groups / Target Audience</div>
        <DataTable rows={rows||[]} cols={["name",...baseCols]}/>
      </div>
    );
  }

  function renderTakeaway() {
    const ins=d.key_takeaways||[];
    const icons=["💡","📈","⚠️","🎯","✨"];
    const bgs=["#f0f9ff","#f0fdf4","#fffbeb","#fdf4ff","#fff1f2"];
    const borders=["#3b82f6","#10b981","#f59e0b","#8b5cf6","#ef4444"];
    return (
      <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Key Takeaways</div>
        {ins.map((txt,i)=>(
          <div key={i} style={{display:"flex",gap:12,marginBottom:12,padding:"12px 16px",background:bgs[i%bgs.length],borderRadius:10,borderLeft:`4px solid ${borders[i%borders.length]}`}}>
            <span style={{fontSize:18,flexShrink:0}}>{icons[i%icons.length]}</span>
            <p style={{margin:0,fontSize:13,color:"#374151",lineHeight:1.6}}>{txt}</p>
          </div>
        ))}
      </div>
    );
  }

  function renderTopic() {
    const rows = d.topics||[];
    const ytCols = ["impressions","interactions","interaction_rate","link_clicks","ctr","video_p25","video_p100"];
    return (
      <div>
        {rows.length>0&&(
          <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Topic — Impressions</div>
            <ResponsiveContainer width="100%" height={420}>
              <BarChart data={rows} layout="vertical" margin={{top:0,right:20,left:0,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" horizontal={false}/>
                <XAxis type="number" tick={{fontSize:10,fill:"#9ca3af"}} tickFormatter={v=>Number(v).toLocaleString()}/>
                <YAxis type="category" dataKey="name" tick={{fontSize:10,fill:"#374151"}} width={230} tickLine={false}/>
                <Tooltip formatter={v=>[fmt(v),"Impressions"]} contentStyle={{borderRadius:8,fontSize:12}}/>
                <Bar dataKey="impressions" radius={[0,4,4,0]}>{rows.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        )}
        <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
          <DataTable rows={rows} cols={["name",...ytCols]}/>
        </div>
      </div>
    );
  }

  function renderSection() {
    if (section==="overview")  return renderOverview();
    if (section==="ta")        return renderTA();
    if (section==="creative")  return <AdTable rows={d.creatives||[]} baseCols={baseCols} kpiKey={getKpiKey()} kpiLabel={getKpiLabel()}/>;
    if (section==="ad_name")   return <AdTable rows={d.ads||[]}       baseCols={baseCols} kpiKey={getKpiKey()} kpiLabel={getKpiLabel()}/>;
    if (section==="topic")     return renderTopic();
    if (section==="age")       return <DemoChart d={d} platform={platform} metaType={metaType} dimKey="age"/>;
    if (section==="gender")    return <DemoChart d={d} platform={platform} metaType={metaType} dimKey="gender"/>;
    if (section==="takeaway")  return renderTakeaway();
    return null;
  }

  return (
    <div style={{minHeight:"100vh",background:"#f9fafb",fontFamily:"'Inter',system-ui,sans-serif",padding:"14px"}}>
      <div style={{marginBottom:14}}>
        <h1 style={{margin:"0 0 2px",fontSize:17,fontWeight:800,color:"#111827"}}>📊 Marketing Dashboard</h1>
        <p style={{margin:0,fontSize:11,color:"#6b7280"}}>{d.account_name||"—"} · {d.date_range||"—"}</p>
      </div>

      {/* Platform tabs */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {Object.entries(PLAT_CFG).map(([k,p])=>(
          <button key={k} onClick={()=>{setPlatform(k);setSection("overview");}}
            style={{padding:"7px 16px",background:platform===k?p.color:"#fff",color:platform===k?"#fff":"#6b7280",border:`1px solid ${platform===k?p.color:"#e5e7eb"}`,borderRadius:9,fontSize:13,fontWeight:700}}>
            {p.icon} {p.label}
          </button>
        ))}
      </div>

      {/* Meta type tabs */}
      {platform==="meta"&&(
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {Object.entries(META_TYPES).map(([k,t])=>(
            <button key={k} onClick={()=>{setMetaType(k);setSection("overview");}}
              style={{padding:"6px 14px",background:metaType===k?t.color+"18":"transparent",color:metaType===k?t.color:"#6b7280",border:`1.5px solid ${metaType===k?t.color:"#e5e7eb"}`,borderRadius:8,fontSize:12,fontWeight:700}}>
              {t.icon} {t.label} <span style={{fontSize:10,opacity:0.7}}>· {t.kpiLabel}</span>
            </button>
          ))}
        </div>
      )}

      {/* Section tabs */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>
        {sections.map(s2=>(
          <button key={s2} onClick={()=>setSection(s2)}
            style={{padding:"5px 13px",background:section===s2?"#111827":"#fff",color:section===s2?"#fff":"#6b7280",border:"1px solid #e5e7eb",borderRadius:8,fontSize:12,fontWeight:600}}>
            {SEC_LABEL[s2]}
          </button>
        ))}
      </div>

      {renderSection()}

      <p style={{textAlign:"center",marginTop:14,fontSize:10,color:"#d1d5db"}}>
        ANmaison · {PLAT_CFG[platform]?.label}{platform==="meta"?" · "+META_TYPES[metaType].label:""}
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
